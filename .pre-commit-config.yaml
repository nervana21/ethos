fail_fast: true

repos:
  # Standard whitespace / EOF sanity checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # Rust formatting: same as scripts/cargo_fmt_precommit.sh (nightly-version if present, then fmt --all)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo +nightly fmt
        entry: bash -c 'n=nightly; [ -f nightly-version ] && n=$(cat nightly-version); cargo +"$n" fmt --all'
        language: system
        types: [rust]
